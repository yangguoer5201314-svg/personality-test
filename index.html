<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人格测试工具 - 深度人格特质探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-1: #f5f0ff;
    --bg-2: #e8f0fe;
    --bg-3: #fef3e8;
    --surface: rgba(255,255,255,.85);
    --surface-hover: rgba(255,255,255,.95);
    --border: rgba(108,92,231,.15);
    --text: #1a1a2e;
    --text-secondary: #6b6b8a;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,.2);
    --green: #00b873;
    --orange: #f59e0b;
    --pink: #e75a8a;
    --blue: #3b82f6;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 16px;
    --radius-sm: 10px;
    --transition: .35s cubic-bezier(.4,0,.2,1);
  }
  html { font-size: 16px; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse 600px 400px at 20% 30%, rgba(108,92,231,.1) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 70%, rgba(245,158,11,.08) 0%, transparent 60%),
      radial-gradient(ellipse 400px 400px at 50% 10%, rgba(59,130,246,.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }
  .screen { display: none; animation: fadeIn .45s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .welcome { text-align: center; padding: 40px 0 20px; }
  .welcome-icon {
    width: 96px; height: 96px; margin: 0 auto 28px;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    box-shadow: 0 0 40px var(--accent-glow), 0 8px 32px rgba(108,92,231,.15);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 40px var(--accent-glow), 0 8px 32px rgba(108,92,231,.15); }
    50% { box-shadow: 0 0 80px var(--accent-glow), 0 12px 48px rgba(108,92,231,.2); }
  }
  .welcome h1 {
    font-size: 2rem; font-weight: 800; letter-spacing: -.03em;
    color: var(--text);
  }
  .welcome h1 span {
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome p {
    color: var(--text-secondary); font-size: .95rem; line-height: 1.7;
    max-width: 420px; margin: 16px auto 0;
  }
  .welcome-features {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin: 24px 0 32px;
  }
  .welcome-features span {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: .82rem;
    color: var(--text-secondary);
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    border: none; color: #fff; font-size: 1rem; font-weight: 600;
    padding: 16px 40px; border-radius: 12px; cursor: pointer;
    transition: var(--transition); font-family: inherit;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.7); border: 1px solid var(--border);
    color: var(--text); font-size: .9rem; font-weight: 500;
    padding: 12px 24px; border-radius: var(--radius-sm); cursor: pointer;
    transition: var(--transition); font-family: inherit;
  }
  .btn-secondary:hover { background: var(--surface-hover); border-color: var(--accent); }
  .quiz-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
  }
  .progress-track {
    flex: 1; height: 6px; background: rgba(108,92,231,.1);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #a29bfe);
    border-radius: 3px; transition: width .5s ease;
  }
  .quiz-counter { font-size: .82rem; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px;
  }
  .question-text {
    font-size: 1.2rem; font-weight: 600; line-height: 1.6;
    margin-bottom: 28px;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,.55); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 18px;
    cursor: pointer; transition: var(--transition); font-family: inherit;
    font-size: .92rem; line-height: 1.5; color: var(--text); text-align: left;
    width: 100%;
  }
  .option:hover { border-color: var(--accent); background: rgba(108,92,231,.06); }
  .option.selected {
    border-color: var(--accent); background: rgba(108,92,231,.1);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .option .dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .option.selected .dot { border-color: var(--accent); background: var(--accent); }
  .option.selected .dot::after {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #fff;
  }
  .quiz-actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 24px;
  }
  .btn-nav {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); padding: 10px 20px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: inherit; font-size: .85rem; font-weight: 500;
    transition: var(--transition);
  }
  .btn-nav:hover { border-color: var(--accent); color: var(--text); }
  .btn-nav:disabled { opacity: .3; cursor: not-allowed; }
  .btn-nav.primary {
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    border-color: transparent; color: #fff;
  }
  .btn-nav.primary:hover { box-shadow: 0 4px 20px var(--accent-glow); }
  .btn-nav.primary:disabled { opacity: .4; }
  .result-header { text-align: center; margin-bottom: 32px; }
  .result-type-badge {
    display: inline-block; padding: 6px 20px; border-radius: 20px;
    font-size: .82rem; font-weight: 600; letter-spacing: .04em;
    margin-bottom: 16px;
  }
  .result-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
  .result-subtitle { color: var(--text-secondary); font-size: .95rem; line-height: 1.6; }
  .result-scores { margin-bottom: 28px; }
  .score-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .score-label {
    width: 80px; font-size: .82rem; font-weight: 500; flex-shrink: 0;
    text-align: right;
  }
  .score-bar-track {
    flex: 1; height: 8px; background: rgba(108,92,231,.08);
    border-radius: 4px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 4px; transition: width .8s ease;
  }
  .score-val {
    width: 32px; font-size: .78rem; color: var(--text-secondary);
    font-weight: 600; text-align: right;
  }
  .result-detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; margin-bottom: 24px;
  }
  .result-detail h3 {
    font-size: 1rem; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .result-detail p, .result-detail li {
    color: var(--text-secondary); font-size: .9rem; line-height: 1.7;
  }
  .result-detail ul { padding-left: 20px; list-style: none; }
  .result-detail li::before { content: "\2022 "; color: var(--accent); font-weight: 700; }
  .result-detail li { margin-bottom: 4px; }
  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .result-actions .btn-secondary svg { width: 16px; height: 16px; }
  .type-explorer .score-bar-fill { background: var(--green); }
  .type-explorer .result-type-badge { background: rgba(0,184,115,.12); color: var(--green); }
  .type-thinker .score-bar-fill { background: var(--blue); }
  .type-thinker .result-type-badge { background: rgba(59,130,246,.12); color: var(--blue); }
  .type-guardian .score-bar-fill { background: var(--orange); }
  .type-guardian .result-type-badge { background: rgba(245,158,11,.12); color: var(--orange); }
  .type-creator .score-bar-fill { background: var(--pink); }
  .type-creator .result-type-badge { background: rgba(231,90,138,.12); color: var(--pink); }
  .type-leader .score-bar-fill { background: var(--red); }
  .type-leader .result-type-badge { background: rgba(239,68,68,.12); color: var(--red); }
  .type-peacemaker .score-bar-fill { background: var(--yellow); }
  .type-peacemaker .result-type-badge { background: rgba(234,179,8,.12); color: var(--yellow); }
  .score-label.e { color: var(--green); }
  .score-label.t { color: var(--blue); }
  .score-label.g { color: var(--orange); }
  .score-label.c { color: var(--pink); }
  .score-label.l { color: var(--red); }
  .score-label.p { color: var(--yellow); }
  @media (max-width: 480px) {
    body { padding: 12px; }
    .question-card { padding: 20px; }
    .question-text { font-size: 1.05rem; }
    .welcome h1 { font-size: 1.6rem; }
    .welcome-icon { width: 72px; height: 72px; font-size: 34px; }
    .result-title { font-size: 1.4rem; }
    .score-label { width: 60px; font-size: .75rem; }
    .option { padding: 12px 14px; font-size: .85rem; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="screen active" id="welcome">
    <div class="welcome">
      <div class="welcome-icon">🧠</div>
      <h1><span>人格测试工具</span></h1>
      <p>通过 12 道情境题，探索你独特的人格特质组合。<br>没有标准答案，只有更了解自己。</p>
      <div class="welcome-features">
        <span>🧭 6 大人格维度</span>
        <span>⏱ 约 3 分钟</span>
        <span>🔬 科学启发</span>
        <span>🔒 匿名</span>
      </div>
      <button class="btn-primary" onclick="startQuiz()">
        开始测试
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </div>
  </div>
  <div class="screen" id="quiz">
    <div class="quiz-header">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="quiz-counter" id="quizCounter">1 / 12</div>
    </div>
    <div class="question-card">
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="quiz-actions">
        <button class="btn-nav" id="prevBtn" onclick="prevQuestion()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:4px"><path d="m15 18-6-6 6-6"/></svg>
          上一题
        </button>
        <button class="btn-nav primary" id="nextBtn" onclick="nextQuestion()" disabled>
          下一题
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-left:4px"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="screen" id="results"></div>
</div>

let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);
function startQuiz() {
  document.getElementById('welcome').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  renderQuestion(0);
}
function renderQuestion(idx) {
  current = idx;
  const q = QUESTIONS[idx];
  const container = document.getElementById('optionsContainer');
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressFill').style.width = ((idx+1)/QUESTIONS.length*100)+'%';
  document.getElementById('quizCounter').textContent = (idx+1)+' / '+QUESTIONS.length;
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (answers[idx] === i ? ' selected' : '');
    btn.innerHTML = '<span class="dot"></span>'+opt.text;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });
  prev.disabled = idx === 0;
  next.disabled = answers[idx] === null;
  if (idx < QUESTIONS.length-1) {
    next.innerHTML = '下一题<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-left:4px"><path d="m9 18 6-6-6-6"/></svg>';
  } else {
    next.innerHTML = '查看结果<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-left:4px"><path d="m9 18 6-6-6-6"/></svg>';
  }
}
function selectOption(i) {
  answers[current] = i;
  const options = document.getElementById('optionsContainer').children;
  for (let j=0; j<options.length; j++) options[j].classList.toggle('selected', j===i);
  document.getElementById('nextBtn').disabled = false;
}
function nextQuestion() {
  if (answers[current] === null) return;
  if (current === QUESTIONS.length-1) { showResults(); return; }
  renderQuestion(current+1);
}
function prevQuestion() {
  if (current === 0) return;
  renderQuestion(current-1);
}
function showResults() {
  const scores = { explorer:0, thinker:0, guardian:0, creator:0, leader:0, peacemaker:0 };
  QUESTIONS.forEach((q, qi) => {
    if (answers[qi] === null) return;
    const opt = q.options[answers[qi]];
    for (const [k,v] of Object.entries(opt.scores)) scores[k] += v;
  });
  const maxScore = Math.max(...Object.values(scores));
  const primary = TYPES.find(t => scores[t.id] === maxScore);
  const sorted = [...TYPES].sort((a,b) => scores[b.id] - scores[a.id]);
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('results').classList.add('active');
  const maxPossible = QUESTIONS.length * 3;
  const container = document.getElementById('results');
  container.className = 'screen active type-'+primary.id;
  container.innerHTML = `
    <div class="result-header">
      <div class="result-type-badge">${primary.emoji} ${primary.label}</div>
      <div class="result-title">你的核心特质：${primary.label}</div>
      <div class="result-subtitle">${primary.desc}</div>
    </div>
    <div class="result-scores">
      ${sorted.map(t => {
        const pct = Math.round(scores[t.id]/maxPossible*100);
        return '<div class="score-row">'
          +'<div class="score-label '+t.id[0]+'">'+t.emoji+' '+t.label+'</div>'
          +'<div class="score-bar-track"><div class="score-bar-fill" style="width:'+pct+'%"></div></div>'
          +'<div class="score-val">'+pct+'%</div></div>';
      }).join('')}
    </div>
    <div class="result-detail">
      <h3>✨ 你的优势</h3>
      <ul>${primary.strengths.map(s => '<li>'+s+'</li>').join('')}</ul>
    </div>
    <div class="result-detail">
      <h3>🌱 成长建议</h3>
      <ul>${primary.growth.map(s => '<li>'+s+'</li>').join('')}</ul>
    </div>
    <div class="result-detail">
      <h3>📊 完整特质分布</h3>
      <p>你的特质分布：<strong>${primary.label}</strong>（主导）→ ${sorted.slice(1,3).map(t => t.label+' · '+Math.round(scores[t.id]/maxPossible*100)+'%').join(' → ')}。你的人格是独一无二的组合，没有哪个维度比另一个更好——它们只是你不同侧面的光芒。</p>
    </div>
    <div class="result-actions">
      <button class="btn-secondary" onclick="restart()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        重新测试
      </button>
      <button class="btn-secondary" onclick="shareResult()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.59 13.51 6.83 3.98"/><path d="m15.41 6.51-6.82 3.98"/></svg>
        分享结果
      </button>
    </div>
  `;
}
function restart() {
  answers = new Array(QUESTIONS.length).fill(null);
  current = 0;
  document.getElementById('results').classList.remove('active');
  document.getElementById('welcome').classList.add('active');
}
function shareResult() {
  const scores = { explorer:0, thinker:0, guardian:0, creator:0, leader:0, peacemaker:0 };
  QUESTIONS.forEach((q, qi) => {
    if (answers[qi] === null) return;
    const opt = q.options[answers[qi]];
    for (const [k,v] of Object.entries(opt.scores)) scores[k] += v;
  });
  const maxScore = Math.max(...Object.values(scores));
  const primary = TYPES.find(t => scores[t.id] === maxScore);
  const text = '🧠 我刚完成了「人格测试工具」测试！\n我的核心特质是：'+primary.emoji+' '+primary.label+'\n\n来试试看：'+window.location.href;
  if (navigator.share) {
    navigator.share({ title:'人格测试工具', text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.result-actions .btn-secondary:last-child');
      const orig = btn.innerHTML;
      btn.innerHTML = '✅ 已复制';
      setTimeout(() => btn.innerHTML = orig, 2000);
    });
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'Enter') { nextQuestion(); }
  if (e.key === 'ArrowLeft') { prevQuestion(); }
});
